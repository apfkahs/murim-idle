<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<title>시안 A · 고대 양피지 두루마리</title>
<style>
  :root{
    --paper-0:#efe3c6;      /* 가장 밝은 양피지 */
    --paper-1:#e8d7b1;
    --paper-2:#d9c392;
    --paper-edge:#b59764;
    --ink:#2a1d10;
    --ink-dim:#5a4528;
    --ink-soft:#7a5b35;
    --seal:#8a2418;
    --seal-dark:#5a160e;
    --gold:#a87c29;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:#1d1a1a;font-family:'Noto Serif KR','Batang','Gungsuh',serif;color:var(--ink);}
  body{min-height:100vh;display:flex;justify-content:center;padding:24px;}

  /* ── 바깥 프레임 (책장 나무) ── */
  .frame{
    width:min(880px,100%);
    background:
      repeating-linear-gradient(135deg, rgba(60,40,20,.08) 0 2px, transparent 2px 6px),
      linear-gradient(180deg,#2f2318,#1e1711);
    border-radius:14px;
    padding:18px;
    box-shadow:0 20px 60px rgba(0,0,0,.5);
  }

  /* ── 두루마리 시트 ── */
  .scroll{
    position:relative;
    background:
      radial-gradient(ellipse at 15% 10%, rgba(255,240,200,.45), transparent 55%),
      radial-gradient(ellipse at 85% 85%, rgba(120,80,30,.22), transparent 60%),
      repeating-linear-gradient(0deg, transparent 0 18px, rgba(140,100,50,.04) 18px 19px),
      linear-gradient(180deg,var(--paper-0) 0%, var(--paper-1) 40%, var(--paper-2) 100%);
    border:1px solid var(--paper-edge);
    border-radius:4px;
    padding:22px 30px 40px;
    box-shadow:
      inset 0 0 80px rgba(120,80,30,.28),
      inset 0 0 18px rgba(140,100,50,.35),
      0 10px 30px rgba(0,0,0,.35);
  }
  /* 얼룩 */
  .scroll::before, .scroll::after{
    content:"";position:absolute;border-radius:50%;pointer-events:none;
  }
  .scroll::before{
    top:12%;left:8%;width:120px;height:80px;
    background:radial-gradient(ellipse at center, rgba(120,70,20,.18), transparent 65%);
    filter:blur(4px);
  }
  .scroll::after{
    bottom:18%;right:10%;width:180px;height:120px;
    background:radial-gradient(ellipse at center, rgba(140,70,20,.14), transparent 70%);
    filter:blur(6px);
  }

  /* ── 두루마리 롤러 (위/아래) ── */
  .roller{
    height:22px;
    background:
      linear-gradient(90deg,#3a2414 0%, #6b4a26 10%, #8a6531 50%, #6b4a26 90%, #3a2414 100%);
    border:1px solid #2a1808;
    border-radius:10px;
    box-shadow:0 2px 6px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,220,160,.25), inset 0 -2px 4px rgba(0,0,0,.5);
    position:relative;
  }
  .roller::before, .roller::after{
    content:"";position:absolute;top:-3px;width:18px;height:28px;border-radius:4px;
    background:linear-gradient(180deg,#b98a44,#6b4a26);
    border:1px solid #2a1808;
  }
  .roller::before{left:-10px}
  .roller::after{right:-10px}
  .roller.bottom{margin-top:-4px}
  .roller.top{margin-bottom:-4px}

  /* ── 헤더 ── */
  .head{
    display:flex;align-items:center;gap:14px;padding:4px 0 14px;
    border-bottom:2px double var(--ink-dim);
  }
  .back-btn{
    background:transparent;border:1px solid var(--ink-dim);color:var(--ink);
    padding:5px 12px;border-radius:3px;font-family:inherit;font-size:13px;cursor:pointer;
  }
  .back-btn:hover{background:rgba(90,60,30,.1);}
  .title{
    flex:1;text-align:center;font-size:24px;letter-spacing:8px;font-weight:700;color:var(--ink);
    font-family:'Nanum Myeongjo','Batang',serif;text-shadow:0 1px 0 rgba(255,240,200,.5);
  }
  .title .sub{display:block;font-size:11px;letter-spacing:4px;color:var(--ink-soft);margin-top:2px;font-weight:400;}

  /* 탭 */
  .tabs{display:flex;gap:0;margin-top:14px;}
  .tab{
    flex:1;padding:10px 6px;text-align:center;cursor:pointer;
    font-size:14px;letter-spacing:2px;color:var(--ink-soft);
    background:rgba(217,195,146,.25);
    border:1px solid var(--paper-edge);
    border-bottom:none;
    position:relative;
  }
  .tab + .tab{border-left:none}
  .tab.active{
    background:linear-gradient(180deg, rgba(255,245,220,.6), rgba(217,195,146,.2));
    color:var(--seal);font-weight:700;
    box-shadow:inset 0 -3px 0 var(--seal);
  }
  .tab.mystery{color:#6b5b85;font-style:italic;}

  /* 자원 인벤토리 */
  .inv{
    display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:18px 0 8px;
    padding:12px 16px;
    background:
      repeating-linear-gradient(90deg, transparent 0 12px, rgba(120,80,30,.06) 12px 13px),
      rgba(255,245,215,.45);
    border:1px solid var(--paper-edge);
    border-radius:4px;
  }
  .inv-cell{display:flex;align-items:center;gap:8px;font-size:13px;}
  .inv-icon{
    width:26px;height:26px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    background:radial-gradient(circle at 35% 35%, #f7c970, #b67a25 60%, #6b4416);
    border:1.5px solid var(--ink);color:#fff8d8;font-size:14px;
    box-shadow:inset 0 -2px 3px rgba(0,0,0,.35);
  }
  .inv-icon.flame{background:radial-gradient(circle at 35% 35%, #f3a24d, #a0321a 60%, #4a0e06);}
  .inv-icon.divine{background:radial-gradient(circle at 35% 35%, #ffe5a1, #d4a53e 60%, #7a5a14);}
  .inv-label{color:var(--ink-soft);font-size:12px;}
  .inv-value{color:var(--ink);font-weight:700;font-size:15px;margin-left:auto;}

  /* 단계 레이블 */
  .tier{
    display:flex;align-items:center;gap:12px;margin:28px 0 6px;
  }
  .tier-line{flex:1;height:1px;background:linear-gradient(90deg,transparent, var(--ink-dim) 20%, var(--ink-dim) 80%, transparent);}
  .tier-label{
    font-size:13px;letter-spacing:8px;color:var(--ink-dim);
    padding:4px 14px;
    border:1px solid var(--ink-dim);border-radius:20px;
    background:rgba(255,245,215,.55);
  }

  /* 트리 레이아웃 */
  .tree{display:flex;flex-direction:column;align-items:center;gap:4px;}
  .row{display:flex;justify-content:center;gap:32px;}
  .line-v{width:2px;height:28px;background:linear-gradient(180deg, var(--ink-dim), transparent);position:relative;}
  .line-v::before, .line-v::after{
    content:"";position:absolute;left:50%;transform:translateX(-50%);
    width:6px;height:6px;border-radius:50%;background:var(--gold);
    box-shadow:0 0 0 1px var(--ink-dim);
  }
  .line-v::before{top:-3px}
  .line-v::after{bottom:-3px}

  .branch-line{
    position:relative;width:360px;height:20px;margin:0 0 6px;
  }
  .branch-line::before{
    content:"";position:absolute;top:0;left:10%;right:10%;height:2px;
    background:linear-gradient(90deg, transparent, var(--ink-dim) 15%, var(--ink-dim) 85%, transparent);
  }
  .branch-line span{
    position:absolute;top:-3px;width:2px;height:20px;background:var(--ink-dim);
  }
  .branch-line span:nth-child(1){left:10%}
  .branch-line span:nth-child(2){left:50%}
  .branch-line span:nth-child(3){right:10%}

  /* ── 노드 (낙인 / 인장) ── */
  .node{display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;}
  .seal{
    width:86px;height:86px;position:relative;
    background:
      radial-gradient(circle at 30% 25%, rgba(255,200,150,.45), transparent 55%),
      radial-gradient(circle at center, var(--seal) 0 62%, var(--seal-dark) 63% 100%);
    border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    color:#f4e6cc;
    font-family:'Nanum Myeongjo',serif;
    box-shadow:
      inset 0 -4px 10px rgba(0,0,0,.45),
      inset 0 2px 5px rgba(255,220,180,.30),
      0 3px 10px rgba(60,20,10,.45);
    transition:transform .15s, box-shadow .15s;
  }
  .seal::before{
    content:"";position:absolute;inset:6px;border:1.5px dashed rgba(255,220,180,.35);border-radius:50%;
  }
  .seal::after{
    content:"";position:absolute;inset:-4px;border-radius:50%;
    background:radial-gradient(circle at 50% 100%, rgba(255,220,180,.15), transparent 50%);
    pointer-events:none;
  }
  .seal .ch{font-size:30px;font-weight:700;letter-spacing:-2px;line-height:1;text-shadow:0 1px 2px rgba(0,0,0,.55);}
  .node:hover .seal{transform:translateY(-2px);box-shadow:inset 0 -4px 10px rgba(0,0,0,.45),inset 0 2px 5px rgba(255,220,180,.30),0 0 0 2px var(--gold), 0 6px 14px rgba(60,20,10,.55);}
  .node .name{font-size:14px;font-weight:600;color:var(--ink);letter-spacing:1px;}
  .node .lvl{
    font-size:11px;color:var(--ink-soft);
    padding:2px 10px;background:rgba(255,245,215,.7);
    border:1px solid var(--paper-edge);border-radius:10px;
  }

  /* 루트 노드는 더 크고 금테 */
  .node.root .seal{
    width:108px;height:108px;
    background:
      radial-gradient(circle at 30% 25%, rgba(255,220,180,.55), transparent 55%),
      radial-gradient(circle at center, #c9391e 0 62%, #74170c 63% 100%);
    box-shadow:
      inset 0 -4px 12px rgba(0,0,0,.5),
      inset 0 2px 6px rgba(255,230,195,.35),
      0 0 0 3px rgba(168,124,41,.6),
      0 0 0 5px rgba(60,40,20,.5),
      0 6px 18px rgba(60,20,10,.5);
  }
  .node.root .seal::before{inset:8px;border-color:rgba(255,230,195,.45);}
  .node.root .seal .ch{font-size:38px}
  .node.root .name{font-size:16px;color:var(--seal-dark);font-weight:700;}

  .node.dim .seal{filter:saturate(.35) brightness(.85);opacity:.75}
  .node.dim .name{color:var(--ink-soft)}

  /* ── 잠긴 영역 ── */
  .locked{
    position:relative;margin:28px 0 0;
    padding:34px 20px;
    border:1px dashed var(--ink-dim);
    border-radius:4px;
    background:
      repeating-linear-gradient(45deg, transparent 0 10px, rgba(120,80,30,.06) 10px 11px),
      rgba(217,195,146,.2);
    text-align:center;cursor:pointer;
    transition:background .15s;
  }
  .locked:hover{background:rgba(217,195,146,.35)}

  .wax-seal{
    width:72px;height:72px;margin:0 auto 14px;position:relative;
    background:
      radial-gradient(circle at 30% 30%, #d4583e, #8a2418 50%, #4a0c06);
    border-radius:50%;
    box-shadow:
      inset 0 -5px 12px rgba(0,0,0,.5),
      inset 0 3px 6px rgba(255,180,150,.4),
      0 4px 10px rgba(80,20,10,.5);
  }
  .wax-seal::before{
    content:"封";position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    color:#f4d5b0;font-size:28px;font-weight:700;font-family:'Nanum Myeongjo',serif;
    text-shadow:0 1px 2px rgba(0,0,0,.55);
  }
  .wax-seal::after{
    content:"";position:absolute;inset:-6px;border-radius:50%;
    background:radial-gradient(circle, transparent 54%, rgba(138,36,24,.25) 56%, transparent 68%);
  }
  .locked-text{font-size:14px;color:var(--ink-dim);letter-spacing:2px;line-height:1.7;}
  .locked-hint{display:block;font-size:11px;color:var(--ink-soft);margin-top:6px;letter-spacing:1px;font-style:italic;}
</style>
</head>
<body>
<div class="frame">
  <div class="scroll">
    <div class="roller top"></div>

    <div class="head">
      <button class="back-btn">← 돌아가기</button>
      <div class="title">拜 火 教 秘 笈<span class="sub">배 화 교 비 급</span></div>
      <button class="back-btn">약안</button>
    </div>

    <div class="tabs">
      <div class="tab">劍 法</div>
      <div class="tab active">心 法</div>
      <div class="tab">步 法</div>
      <div class="tab">外 法</div>
      <div class="tab mystery">?  ?  ?</div>
    </div>

    <div class="inv">
      <div class="inv-cell"><div class="inv-icon">火</div><span class="inv-label">희미한 잔불</span><span class="inv-value">7</span></div>
      <div class="inv-cell"><div class="inv-icon flame">焰</div><span class="inv-label">타오르는 불꽃</span><span class="inv-value">0</span></div>
      <div class="inv-cell"><div class="inv-icon divine">聖</div><span class="inv-label">신성한 불의 정수</span><span class="inv-value">0</span></div>
    </div>

    <div class="tier">
      <div class="tier-line"></div>
      <div class="tier-label">一 段</div>
      <div class="tier-line"></div>
    </div>

    <div class="tree">
      <div class="row">
        <div class="node root">
          <div class="seal"><span class="ch">開</span></div>
          <div class="name">심법 개방</div>
          <div class="lvl">1 / 30</div>
        </div>
      </div>

      <div class="line-v"></div>
      <div class="branch-line"><span></span><span></span><span></span></div>

      <div class="row">
        <div class="node dim">
          <div class="seal"><span class="ch">念</span></div>
          <div class="name">재의 묵념</div>
          <div class="lvl">0 / 30</div>
        </div>
        <div class="node dim">
          <div class="seal"><span class="ch">誓</span></div>
          <div class="name">재의 맹세</div>
          <div class="lvl">0 / 30</div>
        </div>
        <div class="node dim">
          <div class="seal"><span class="ch">速</span></div>
          <div class="name">재의 빠름</div>
          <div class="lvl">0 / 30</div>
        </div>
      </div>
    </div>

    <div class="locked">
      <div class="wax-seal"></div>
      <div class="locked-text">封 — 이 다음 장은 아직 봉인되었다</div>
      <span class="locked-hint">강적이 품은 비밀, 혹은 끊임없는 수련</span>
    </div>

    <div class="locked">
      <div class="wax-seal"></div>
      <div class="locked-text">封 — 세 번째 장</div>
      <span class="locked-hint">깊은 경지에 이른 자만이 펼칠 수 있는 두루마리</span>
    </div>

    <div class="roller bottom"></div>
  </div>
</div>
</body>
</html>

<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<title>시안 C · 불꽃 인장 비급</title>
<style>
  :root{
    --bg-0:#0c0605;
    --bg-1:#1a0d08;
    --bg-2:#281410;
    --ember:#ff8c3a;
    --ember-deep:#d04a10;
    --ember-glow:#ffb766;
    --ash:#4a2418;
    --gold-1:#e8b852;
    --gold-2:#a07a24;
    --parch:#f0dcb0;
    --ink-bright:#f5d8a0;
    --ink-mid:#b08a5a;
    --ink-dim:#6f5332;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:#060404;font-family:'Noto Serif KR','Batang','Gungsuh',serif;color:var(--ink-bright);}
  body{min-height:100vh;display:flex;justify-content:center;padding:24px;}

  /* ── 외곽 : 은은한 불씨 배경 ── */
  .frame{
    width:min(880px,100%);
    position:relative;
    background:
      radial-gradient(ellipse at 20% 0%, rgba(208,74,16,.35), transparent 50%),
      radial-gradient(ellipse at 80% 100%, rgba(208,74,16,.25), transparent 55%),
      radial-gradient(ellipse at 50% 50%, rgba(40,20,16,.8), transparent 70%),
      linear-gradient(180deg, #1a0b06 0%, #0a0504 100%);
    border:1px solid rgba(208,74,16,.25);
    border-radius:10px;
    padding:18px 20px 28px;
    box-shadow:
      inset 0 0 80px rgba(208,74,16,.08),
      0 25px 70px rgba(0,0,0,.7);
    overflow:hidden;
  }
  /* 떠다니는 불씨 입자 */
  .frame::before, .frame::after{
    content:"";position:absolute;pointer-events:none;
    width:3px;height:3px;border-radius:50%;background:var(--ember-glow);
    box-shadow:
      120px 80px 0 0.5px var(--ember-glow),
      200px 140px 0 0 var(--ember),
      300px 60px 0 0 var(--ember-glow),
      420px 220px 0 0 var(--ember),
      540px 120px 0 0 var(--ember-glow),
      640px 300px 0 0 var(--ember),
      720px 180px 0 0 var(--ember-glow),
      60px 300px 0 0 var(--ember),
      380px 420px 0 0 var(--ember-glow),
      500px 500px 0 0 var(--ember);
    top:40px;left:10px;
    opacity:.55;
    filter:blur(.6px);
  }

  /* ── 헤더 ── */
  .head{
    position:relative;
    display:flex;align-items:center;gap:14px;
    padding:6px 6px 16px;
    border-bottom:1px solid rgba(208,74,16,.25);
  }
  .head::after{
    content:"";position:absolute;left:0;right:0;bottom:-1px;height:1px;
    background:linear-gradient(90deg, transparent, var(--ember) 30%, var(--ember) 70%, transparent);
    box-shadow:0 0 12px rgba(255,140,58,.5);
  }
  .back-btn{
    background:rgba(0,0,0,.4);
    border:1px solid rgba(208,74,16,.35);
    color:var(--ink-bright);
    padding:6px 14px;border-radius:4px;font-family:inherit;font-size:13px;cursor:pointer;
    letter-spacing:1px;
    transition:all .15s;
  }
  .back-btn:hover{background:rgba(208,74,16,.18);border-color:var(--ember);color:var(--ember-glow);box-shadow:0 0 10px rgba(255,140,58,.3);}

  .title{
    flex:1;text-align:center;
    font-family:'Nanum Myeongjo',serif;font-weight:700;
    font-size:26px;letter-spacing:14px;
    background:linear-gradient(180deg, #fff0c8 0%, var(--ember-glow) 45%, var(--ember) 75%, #8a2a08 100%);
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
    filter:drop-shadow(0 0 12px rgba(255,140,58,.55));
  }
  .title .sub{
    display:block;font-size:10px;letter-spacing:8px;color:var(--ink-mid);margin-top:3px;
    -webkit-text-fill-color:var(--ink-mid);
  }

  /* ── 탭 ── */
  .tabs{display:flex;gap:4px;margin-top:18px;justify-content:center;}
  .tab{
    flex:1;padding:10px 4px;cursor:pointer;
    text-align:center;
    font-family:'Nanum Myeongjo',serif;
    font-size:15px;letter-spacing:6px;color:var(--ink-dim);
    background:linear-gradient(180deg, rgba(20,10,6,.6) 0%, rgba(10,5,3,.8) 100%);
    border:1px solid rgba(120,60,30,.25);
    border-radius:6px 6px 0 0;
    transition:all .15s;
    position:relative;
  }
  .tab:hover{color:var(--ink-mid);border-color:rgba(208,74,16,.35);}
  .tab.active{
    color:var(--ember-glow);
    background:
      radial-gradient(ellipse at top, rgba(255,140,58,.20), transparent 70%),
      linear-gradient(180deg, rgba(50,20,10,.8) 0%, rgba(20,10,6,.8) 100%);
    border-color:rgba(208,74,16,.6);
    text-shadow:0 0 8px rgba(255,140,58,.55);
  }
  .tab.active::after{
    content:"";position:absolute;left:10%;right:10%;bottom:-1px;height:2px;
    background:linear-gradient(90deg, transparent, var(--ember) 50%, transparent);
    box-shadow:0 0 10px var(--ember);
  }
  .tab.mystery{color:#6f5a88;}

  /* ── 자원 ── */
  .inv{
    margin:14px 0 8px;
    padding:14px 18px;
    background:
      radial-gradient(ellipse at 50% 0%, rgba(208,74,16,.12), transparent 70%),
      rgba(0,0,0,.45);
    border:1px solid rgba(208,74,16,.22);
    border-radius:8px;
    display:grid;grid-template-columns:repeat(3,1fr);gap:16px;
  }
  .inv-cell{display:flex;align-items:center;gap:12px;font-size:13px;}
  .inv-icon{
    width:34px;height:34px;flex-shrink:0;position:relative;
    display:flex;align-items:center;justify-content:center;
    border-radius:50%;
    font-family:'Nanum Myeongjo',serif;font-size:16px;font-weight:700;
    background:
      radial-gradient(circle at 35% 30%, #ffd28a, var(--ember) 55%, #5a1a08);
    color:#fff6d8;
    text-shadow:0 1px 2px rgba(0,0,0,.8);
    box-shadow:
      inset 0 -3px 6px rgba(0,0,0,.5),
      inset 0 2px 3px rgba(255,220,150,.4),
      0 0 12px rgba(255,140,58,.35);
  }
  .inv-icon.flame{background:radial-gradient(circle at 35% 30%, #ffb56a, #c83410 55%, #3a0a04);}
  .inv-icon.divine{background:radial-gradient(circle at 35% 30%, #fff0c0, var(--gold-1) 55%, #6a4a14);box-shadow:inset 0 -3px 6px rgba(0,0,0,.5),inset 0 2px 3px rgba(255,230,180,.5),0 0 14px rgba(232,184,82,.4);}
  .inv-label{color:var(--ink-mid);font-size:12px;}
  .inv-value{margin-left:auto;color:var(--ink-bright);font-weight:700;font-size:17px;font-family:'Nanum Myeongjo',serif;}

  /* ── 단계 레이블 ── */
  .tier{display:flex;align-items:center;gap:14px;margin:32px 0 18px;}
  .tier-line{
    flex:1;height:1px;
    background:linear-gradient(90deg,transparent, rgba(208,74,16,.45) 30%, rgba(208,74,16,.45) 70%, transparent);
    box-shadow:0 0 6px rgba(208,74,16,.25);
  }
  .tier-label{
    font-family:'Nanum Myeongjo',serif;font-size:14px;letter-spacing:10px;font-weight:700;
    color:var(--ember-glow);
    padding:6px 22px;
    background:
      radial-gradient(ellipse at center, rgba(208,74,16,.18), transparent 70%),
      rgba(0,0,0,.5);
    border:1px solid rgba(208,74,16,.5);
    border-radius:20px;
    text-shadow:0 0 8px rgba(255,140,58,.55);
  }

  /* ── 트리 ── */
  .tree{display:flex;flex-direction:column;align-items:center;gap:0;}
  .row{display:flex;justify-content:center;gap:42px;padding:8px 0;}

  /* 불씨 연결선 */
  .line-v{
    width:3px;height:36px;
    background:linear-gradient(180deg, var(--ember) 0%, var(--ember-deep) 50%, transparent 100%);
    box-shadow:0 0 8px rgba(255,140,58,.55), 0 0 18px rgba(208,74,16,.3);
    border-radius:2px;
    position:relative;
  }
  .line-v::before, .line-v::after{
    content:"";position:absolute;left:50%;transform:translateX(-50%);
    width:8px;height:8px;border-radius:50%;background:var(--ember-glow);
    box-shadow:0 0 12px var(--ember);
  }
  .line-v::before{top:-4px}
  .line-v::after{bottom:-4px;background:var(--ember-deep);box-shadow:0 0 10px var(--ember-deep);}

  .branch{
    position:relative;width:480px;height:24px;
  }
  .branch::before{
    content:"";position:absolute;top:2px;left:6%;right:6%;height:2px;
    background:linear-gradient(90deg,transparent, var(--ember-deep) 12%, var(--ember) 50%, var(--ember-deep) 88%, transparent);
    box-shadow:0 0 8px rgba(255,140,58,.45);
    border-radius:2px;
  }
  .branch i{
    position:absolute;top:2px;width:2px;height:24px;
    background:linear-gradient(180deg, var(--ember), transparent);
    box-shadow:0 0 6px rgba(255,140,58,.5);
  }
  .branch i:nth-child(1){left:6%}
  .branch i:nth-child(2){left:50%}
  .branch i:nth-child(3){right:6%}

  /* ── 노드 : 불꽃 인장(원형 메달리온) ── */
  .node{display:flex;flex-direction:column;align-items:center;gap:10px;cursor:pointer;position:relative;}

  .medal{
    width:96px;height:96px;position:relative;
    border-radius:50%;
    background:
      radial-gradient(circle at 32% 28%, rgba(255,220,150,.4), transparent 55%),
      radial-gradient(circle at center, #3a1a0c 0%, #180806 70%, #0a0303 100%);
    border:2px solid var(--gold-2);
    display:flex;align-items:center;justify-content:center;
    box-shadow:
      inset 0 0 0 2px rgba(0,0,0,.55),
      inset 0 0 22px rgba(208,74,16,.25),
      inset 0 3px 6px rgba(255,200,140,.2),
      0 0 0 3px rgba(0,0,0,.6),
      0 0 22px rgba(208,74,16,.35),
      0 6px 18px rgba(0,0,0,.65);
    transition:all .2s;
  }
  .medal::before{
    content:"";position:absolute;inset:6px;border-radius:50%;
    border:1px dashed rgba(232,184,82,.4);
    pointer-events:none;
  }
  .medal::after{
    /* 외부 불꽃 톱니 */
    content:"";position:absolute;inset:-5px;border-radius:50%;
    background:conic-gradient(
      from 0deg,
      var(--ember) 0 10deg, transparent 10deg 30deg,
      var(--ember) 30deg 40deg, transparent 40deg 60deg,
      var(--ember) 60deg 70deg, transparent 70deg 90deg,
      var(--ember) 90deg 100deg, transparent 100deg 120deg,
      var(--ember) 120deg 130deg, transparent 130deg 150deg,
      var(--ember) 150deg 160deg, transparent 160deg 180deg,
      var(--ember) 180deg 190deg, transparent 190deg 210deg,
      var(--ember) 210deg 220deg, transparent 220deg 240deg,
      var(--ember) 240deg 250deg, transparent 250deg 270deg,
      var(--ember) 270deg 280deg, transparent 280deg 300deg,
      var(--ember) 300deg 310deg, transparent 310deg 330deg,
      var(--ember) 330deg 340deg, transparent 340deg 360deg
    );
    filter:blur(4px);opacity:.55;
    z-index:-1;
  }
  .medal .ch{
    font-family:'Nanum Myeongjo',serif;
    font-size:40px;font-weight:700;line-height:1;letter-spacing:-2px;
    background:linear-gradient(180deg, #fff0c8 0%, var(--ember-glow) 45%, var(--ember) 90%);
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
    filter:drop-shadow(0 0 6px rgba(255,140,58,.6));
  }
  .lvl-ring{
    position:absolute;bottom:-6px;left:50%;transform:translateX(-50%);
    padding:2px 10px;
    font-size:11px;font-family:'Nanum Myeongjo',serif;font-weight:700;
    color:var(--ink-bright);
    background:rgba(0,0,0,.85);
    border:1px solid var(--gold-2);border-radius:10px;
    box-shadow:0 0 8px rgba(208,74,16,.3);white-space:nowrap;
  }
  .node:hover .medal{
    transform:translateY(-2px);
    box-shadow:
      inset 0 0 0 2px rgba(0,0,0,.55),
      inset 0 0 28px rgba(208,74,16,.4),
      inset 0 3px 8px rgba(255,200,140,.3),
      0 0 0 3px rgba(0,0,0,.6),
      0 0 32px rgba(208,74,16,.55),
      0 8px 22px rgba(0,0,0,.7);
    border-color:var(--gold-1);
  }
  .node .name{font-size:13px;color:var(--ink-bright);letter-spacing:2px;font-family:'Nanum Myeongjo',serif;margin-top:8px;}

  /* 루트 노드 — 태양 */
  .node.root .medal{
    width:122px;height:122px;
    background:
      radial-gradient(circle at 32% 28%, rgba(255,220,150,.55), transparent 55%),
      radial-gradient(circle at center, #8a2a0c 0%, #3a0e06 65%, #1a0604 100%);
    border:3px solid var(--gold-1);
    box-shadow:
      inset 0 0 0 2px rgba(0,0,0,.55),
      inset 0 0 30px rgba(255,140,58,.4),
      inset 0 4px 8px rgba(255,220,180,.35),
      0 0 0 3px rgba(0,0,0,.6),
      0 0 0 6px rgba(232,184,82,.35),
      0 0 40px rgba(255,140,58,.55),
      0 8px 24px rgba(0,0,0,.7);
    animation:pulse 2.6s ease-in-out infinite alternate;
  }
  .node.root .medal .ch{font-size:54px;}
  .node.root .name{color:var(--ember-glow);font-size:15px;text-shadow:0 0 8px rgba(255,140,58,.4);}

  @keyframes pulse{
    from{box-shadow:inset 0 0 0 2px rgba(0,0,0,.55),inset 0 0 28px rgba(255,140,58,.35),inset 0 4px 8px rgba(255,220,180,.3),0 0 0 3px rgba(0,0,0,.6),0 0 0 6px rgba(232,184,82,.3),0 0 30px rgba(255,140,58,.4),0 8px 24px rgba(0,0,0,.7);}
    to{box-shadow:inset 0 0 0 2px rgba(0,0,0,.55),inset 0 0 36px rgba(255,140,58,.55),inset 0 4px 10px rgba(255,220,180,.4),0 0 0 3px rgba(0,0,0,.6),0 0 0 6px rgba(232,184,82,.45),0 0 50px rgba(255,140,58,.7),0 8px 28px rgba(0,0,0,.75);}
  }

  .node.dim .medal{filter:saturate(.2) brightness(.45);}
  .node.dim .medal::after{opacity:0}
  .node.dim .name{color:var(--ink-dim)}

  /* ── 잠긴 영역 ── */
  .locked{
    position:relative;margin:38px 0 0;
    padding:36px 24px 30px;
    background:
      radial-gradient(ellipse at 50% 50%, rgba(208,74,16,.1), transparent 70%),
      rgba(0,0,0,.55);
    border:1px solid rgba(120,60,30,.35);
    border-radius:8px;
    text-align:center;cursor:pointer;
    transition:all .15s;
    overflow:hidden;
  }
  .locked:hover{border-color:rgba(208,74,16,.55);background:radial-gradient(ellipse at 50% 50%, rgba(208,74,16,.18), transparent 70%),rgba(0,0,0,.6);}
  .locked::before{
    content:"";position:absolute;left:0;right:0;top:0;height:1px;
    background:linear-gradient(90deg,transparent, rgba(208,74,16,.5) 40%, rgba(208,74,16,.5) 60%, transparent);
  }

  .lock-medal{
    width:86px;height:86px;margin:0 auto 16px;position:relative;
    border-radius:50%;
    background:
      radial-gradient(circle at 30% 30%, rgba(120,60,30,.4), transparent 55%),
      radial-gradient(circle, #1a0a06 0%, #0a0402 100%);
    border:2px solid rgba(120,60,30,.55);
    display:flex;align-items:center;justify-content:center;
    box-shadow:
      inset 0 0 0 2px rgba(0,0,0,.7),
      inset 0 0 18px rgba(208,74,16,.15),
      0 0 20px rgba(120,60,30,.25);
  }
  .lock-medal::before{
    content:"封";position:absolute;font-family:'Nanum Myeongjo',serif;font-size:38px;font-weight:700;
    color:var(--ink-dim);
    text-shadow:0 0 6px rgba(208,74,16,.3);
  }
  .lock-medal::after{
    content:"";position:absolute;inset:6px;border-radius:50%;
    border:1px dashed rgba(120,60,30,.45);
  }

  .locked-text{font-size:14px;color:var(--ink-mid);letter-spacing:4px;font-family:'Nanum Myeongjo',serif;}
  .locked-hint{display:block;font-size:11px;color:var(--ink-dim);margin-top:8px;letter-spacing:2px;font-style:italic;}
</style>
</head>
<body>
<div class="frame">
  <div class="head">
    <button class="back-btn">← 돌아가기</button>
    <div class="title">拜火秘笈<span class="sub">B A E H W A G Y O · S E C R E T · S C R I P T</span></div>
    <button class="back-btn">🌙 약안</button>
  </div>

  <div class="tabs">
    <div class="tab">劍法</div>
    <div class="tab active">心法</div>
    <div class="tab">步法</div>
    <div class="tab">外法</div>
    <div class="tab mystery">???</div>
  </div>

  <div class="inv">
    <div class="inv-cell"><div class="inv-icon">火</div><span class="inv-label">희미한 잔불</span><span class="inv-value">7</span></div>
    <div class="inv-cell"><div class="inv-icon flame">焰</div><span class="inv-label">타오르는 불꽃</span><span class="inv-value">0</span></div>
    <div class="inv-cell"><div class="inv-icon divine">聖</div><span class="inv-label">신성한 정수</span><span class="inv-value">0</span></div>
  </div>

  <div class="tier">
    <div class="tier-line"></div>
    <div class="tier-label">一 段</div>
    <div class="tier-line"></div>
  </div>

  <div class="tree">
    <div class="row">
      <div class="node root">
        <div class="medal"><div class="ch">開</div></div>
        <div class="lvl-ring">1 / 30</div>
        <div class="name">심법 개방</div>
      </div>
    </div>

    <div class="line-v" style="margin-top:22px"></div>
    <div class="branch"><i></i><i></i><i></i></div>

    <div class="row">
      <div class="node dim">
        <div class="medal"><div class="ch">念</div></div>
        <div class="lvl-ring">0 / 30</div>
        <div class="name">재의 묵념</div>
      </div>
      <div class="node dim">
        <div class="medal"><div class="ch">誓</div></div>
        <div class="lvl-ring">0 / 30</div>
        <div class="name">재의 맹세</div>
      </div>
      <div class="node dim">
        <div class="medal"><div class="ch">速</div></div>
        <div class="lvl-ring">0 / 30</div>
        <div class="name">재의 빠름</div>
      </div>
    </div>
  </div>

  <div class="locked">
    <div class="lock-medal"></div>
    <div class="locked-text">二段 · 봉인된 장</div>
    <span class="locked-hint">강적이 품은 비밀, 혹은 끊임없는 수련</span>
  </div>

  <div class="locked">
    <div class="lock-medal"></div>
    <div class="locked-text">三段 · 깊은 봉인</div>
    <span class="locked-hint">경지에 이른 자만이 펼칠 수 있는 두루마리</span>
  </div>
</div>
</body>
</html>

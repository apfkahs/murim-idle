<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<title>배화교 비급 UI 시안 비교</title>
<style>
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:#0c0a0a;color:#d8c89a;font-family:'Noto Serif KR','Batang',serif;}
  body{min-height:100vh;}

  .topbar{
    position:sticky;top:0;z-index:10;
    display:flex;align-items:center;gap:12px;
    padding:14px 20px;
    background:rgba(20,14,10,.92);
    border-bottom:1px solid rgba(201,160,67,.25);
    backdrop-filter:blur(6px);
  }
  .topbar h1{
    margin:0;font-size:16px;font-weight:700;letter-spacing:4px;color:#e8b852;
    flex-shrink:0;
  }
  .topbar .desc{
    font-size:12px;color:#8a7548;letter-spacing:1px;
  }
  .tabs{display:flex;gap:6px;margin-left:auto;}
  .tab{
    padding:8px 18px;
    background:transparent;
    border:1px solid rgba(201,160,67,.3);
    color:#a08456;
    font-family:inherit;font-size:13px;letter-spacing:2px;cursor:pointer;
    border-radius:4px;
    transition:all .15s;
  }
  .tab:hover{color:#e8b852;border-color:#c9a043;background:rgba(201,160,67,.08);}
  .tab.active{
    color:#0c0a0a;background:#e8b852;border-color:#e8b852;font-weight:700;
    box-shadow:0 0 14px rgba(201,160,67,.35);
  }

  .stage{
    width:100%;
    height:calc(100vh - 58px);
    overflow:hidden;
  }
  iframe{
    width:100%;height:100%;border:0;display:block;
  }

  .legend{
    position:fixed;left:20px;bottom:20px;z-index:5;
    padding:10px 14px;
    background:rgba(20,14,10,.92);
    border:1px solid rgba(201,160,67,.3);
    border-radius:6px;
    font-size:12px;color:#a08456;
    max-width:300px;line-height:1.6;
  }
  .legend b{color:#e8b852;display:block;margin-bottom:4px;letter-spacing:2px;}
</style>
</head>
<body>
<div class="topbar">
  <h1>배화교 비급 · UI 시안 비교</h1>
  <span class="desc">고대 비급 두루마리 컨셉 · 3개 시안</span>
  <div class="tabs">
    <button class="tab active" data-src="skilltree-A-parchment.html">A · 양피지</button>
    <button class="tab" data-src="skilltree-B-darksilk.html">B · 흑단 비단</button>
    <button class="tab" data-src="skilltree-C-fireseal.html">C · 불꽃 인장</button>
  </div>
</div>
<div class="stage">
  <iframe id="frame" src="skilltree-A-parchment.html"></iframe>
</div>
<div class="legend" id="legend">
  <b>A · 양피지 두루마리</b>
  밝은 베이지 양피지 + 빨간 봉랍 인장. 책장 나무 프레임, 위/아래 두루마리 롤러. 고전 서적의 따뜻한 톤.
</div>

<script>
  const meta = {
    'skilltree-A-parchment.html': {
      title: 'A · 양피지 두루마리',
      desc: '밝은 베이지 양피지 + 빨간 봉랍 인장. 책장 나무 프레임, 위/아래 두루마리 롤러. 고전 서적의 따뜻한 톤.'
    },
    'skilltree-B-darksilk.html': {
      title: 'B · 흑단 비단 비급',
      desc: '검은 비단 + 금사 자수 + 주사 인장. 죽간 탭, 모서리 금장식. 격조 있고 절제된 무림 비전 분위기.'
    },
    'skilltree-C-fireseal.html': {
      title: 'C · 불꽃 인장',
      desc: '어두운 배경 + 살아있는 불씨 + 원형 메달리온. 배화교 정체성을 가장 강하게 살린 화염 톤.'
    }
  };
  const frame = document.getElementById('frame');
  const legend = document.getElementById('legend');
  document.querySelectorAll('.tab').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      const src = btn.dataset.src;
      frame.src = src;
      const m = meta[src];
      legend.innerHTML = '<b>'+m.title+'</b>'+m.desc;
    });
  });
</script>
</body>
</html>

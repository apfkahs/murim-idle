<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<title>시안 B · 흑단 비단 비급</title>
<style>
  :root{
    --bg-deep:#0e0a08;
    --silk-0:#1a1310;
    --silk-1:#241915;
    --silk-2:#2e2018;
    --gold-1:#c9a043;
    --gold-2:#8a6a25;
    --gold-3:#5a431a;
    --vermilion:#a8331e;
    --vermilion-deep:#5e1a0e;
    --ink-light:#d8c89a;
    --ink-mid:#a08456;
    --ink-dim:#6b5535;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:#080605;font-family:'Noto Serif KR','Batang','Gungsuh',serif;color:var(--ink-light);}
  body{min-height:100vh;display:flex;justify-content:center;padding:24px;}

  /* ── 외곽 흑단 프레임 ── */
  .frame{
    width:min(880px,100%);
    background:
      repeating-linear-gradient(0deg, transparent 0 3px, rgba(0,0,0,.35) 3px 4px),
      linear-gradient(180deg,#1a1208 0%, #0c0805 100%);
    border:1px solid #2a1d10;
    border-radius:6px;
    padding:14px;
    box-shadow:
      inset 0 0 0 1px rgba(201,160,67,.15),
      0 25px 70px rgba(0,0,0,.7);
    position:relative;
  }
  /* 모서리 금장식 */
  .corner{position:absolute;width:30px;height:30px;border:1.5px solid var(--gold-2);}
  .corner.tl{top:6px;left:6px;border-right:none;border-bottom:none;}
  .corner.tr{top:6px;right:6px;border-left:none;border-bottom:none;}
  .corner.bl{bottom:6px;left:6px;border-right:none;border-top:none;}
  .corner.br{bottom:6px;right:6px;border-left:none;border-top:none;}

  /* ── 비단 본문 ── */
  .silk{
    position:relative;
    background:
      /* 자수 직조 패턴 */
      repeating-linear-gradient(45deg, rgba(201,160,67,.04) 0 1px, transparent 1px 6px),
      repeating-linear-gradient(-45deg, rgba(201,160,67,.03) 0 1px, transparent 1px 6px),
      radial-gradient(ellipse at 20% 20%, rgba(168,51,30,.06), transparent 55%),
      radial-gradient(ellipse at 80% 80%, rgba(201,160,67,.06), transparent 55%),
      linear-gradient(180deg, var(--silk-1) 0%, var(--silk-0) 100%);
    border:1px solid rgba(201,160,67,.18);
    border-radius:3px;
    padding:24px 32px 36px;
    box-shadow:inset 0 0 60px rgba(0,0,0,.55), inset 0 0 0 6px rgba(0,0,0,.3);
  }

  /* ── 헤더 ── */
  .head{
    display:flex;align-items:center;gap:14px;
    padding:6px 0 14px;
    border-bottom:1px solid rgba(201,160,67,.25);
  }
  .head::after{
    content:"";display:block;
  }
  .back-btn{
    background:transparent;border:1px solid rgba(201,160,67,.35);color:var(--ink-light);
    padding:5px 12px;border-radius:2px;font-family:inherit;font-size:13px;cursor:pointer;
    letter-spacing:1px;
  }
  .back-btn:hover{background:rgba(201,160,67,.08);border-color:var(--gold-1);color:var(--gold-1);}

  .title{
    flex:1;text-align:center;
    font-family:'Nanum Myeongjo',serif;
    font-size:22px;letter-spacing:14px;
    color:var(--gold-1);
    text-shadow:0 0 10px rgba(201,160,67,.35), 0 1px 0 #000;
    font-weight:700;
  }
  .title .sub{display:block;font-size:10px;letter-spacing:6px;color:var(--ink-mid);margin-top:4px;font-weight:400;}

  /* 탭 — 죽간 */
  .tabs{display:flex;gap:6px;margin-top:18px;justify-content:center;}
  .tab{
    flex:1;padding:0;cursor:pointer;
    position:relative;
    height:48px;
    display:flex;align-items:center;justify-content:center;
    font-size:14px;letter-spacing:6px;
    color:var(--ink-dim);
    background:
      linear-gradient(180deg, #2a1f15 0%, #1a120c 100%);
    border:1px solid #3a2814;
    border-top:2px solid #5a4020;
    border-radius:2px 2px 0 0;
    box-shadow:inset 0 -2px 4px rgba(0,0,0,.6);
  }
  .tab.active{
    color:var(--gold-1);
    background:
      radial-gradient(ellipse at top, rgba(201,160,67,.18), transparent 60%),
      linear-gradient(180deg, #3a2614 0%, #1f1409 100%);
    border-color:var(--gold-2);border-top-color:var(--gold-1);
    text-shadow:0 0 6px rgba(201,160,67,.5);
  }
  .tab.active::after{
    content:"";position:absolute;left:8%;right:8%;bottom:-2px;height:2px;background:var(--gold-1);
    box-shadow:0 0 8px rgba(201,160,67,.7);
  }
  .tab.mystery{color:#6b5b85;}
  .tab.mystery.active{color:#b59ee0;border-color:#5b4a82;}

  /* 자원 */
  .inv{
    margin:18px 0 8px;
    padding:14px 18px;
    background:rgba(0,0,0,.35);
    border:1px solid rgba(201,160,67,.18);
    border-radius:3px;
    display:grid;grid-template-columns:repeat(3,1fr);gap:14px;
    position:relative;
  }
  .inv::before{
    content:"";position:absolute;inset:3px;border:1px dashed rgba(201,160,67,.10);border-radius:2px;pointer-events:none;
  }
  .inv-cell{display:flex;align-items:center;gap:10px;font-size:13px;}
  .inv-icon{
    width:30px;height:30px;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
    border-radius:2px;
    font-family:'Nanum Myeongjo',serif;
    font-size:14px;font-weight:700;
    background:linear-gradient(180deg, rgba(168,51,30,.55), rgba(94,26,14,.85));
    border:1px solid rgba(201,160,67,.45);
    color:var(--gold-1);
    text-shadow:0 1px 1px rgba(0,0,0,.7);
    box-shadow:inset 0 1px 0 rgba(255,210,140,.18), 0 0 0 1px rgba(0,0,0,.5);
  }
  .inv-icon.flame{background:linear-gradient(180deg, rgba(168,90,30,.55), rgba(94,42,10,.85));}
  .inv-icon.divine{background:linear-gradient(180deg, rgba(201,160,67,.45), rgba(94,72,20,.85));}
  .inv-label{color:var(--ink-mid);font-size:12px;letter-spacing:1px;}
  .inv-value{margin-left:auto;color:var(--gold-1);font-weight:700;font-size:16px;font-family:'Nanum Myeongjo',serif;text-shadow:0 0 6px rgba(201,160,67,.3);}

  /* 단계 */
  .tier{display:flex;align-items:center;gap:14px;margin:30px 0 14px;}
  .tier-line{flex:1;height:1px;background:linear-gradient(90deg,transparent, rgba(201,160,67,.4) 30%, rgba(201,160,67,.4) 70%, transparent);}
  .tier-label{
    color:var(--gold-1);font-size:13px;letter-spacing:8px;font-family:'Nanum Myeongjo',serif;
    padding:6px 18px;
    background:
      radial-gradient(ellipse at center, rgba(201,160,67,.10), transparent 70%),
      rgba(0,0,0,.45);
    border:1px solid rgba(201,160,67,.35);
    border-radius:2px;
    text-shadow:0 0 6px rgba(201,160,67,.4);
    position:relative;
  }
  .tier-label::before, .tier-label::after{
    content:"❖";color:var(--gold-2);font-size:9px;margin:0 6px;vertical-align:middle;
  }

  /* 트리 */
  .tree{display:flex;flex-direction:column;align-items:center;gap:0;}
  .row{display:flex;justify-content:center;gap:36px;padding:6px 0;}

  /* 연결선 — 금사 */
  .line-v{
    width:1px;height:32px;
    background:linear-gradient(180deg, rgba(201,160,67,.7) 0%, rgba(201,160,67,.2) 100%);
    position:relative;
  }
  .line-v::before, .line-v::after{
    content:"◆";position:absolute;left:50%;transform:translateX(-50%);
    color:var(--gold-1);font-size:8px;line-height:1;
    text-shadow:0 0 4px rgba(201,160,67,.6);
  }
  .line-v::before{top:-6px}
  .line-v::after{bottom:-6px}

  .branch{
    position:relative;width:440px;height:18px;
  }
  .branch::before{
    content:"";position:absolute;top:0;left:8%;right:8%;height:1px;
    background:linear-gradient(90deg,transparent, rgba(201,160,67,.5) 15%, rgba(201,160,67,.5) 85%, transparent);
  }
  .branch i{
    position:absolute;top:0;width:1px;height:18px;
    background:linear-gradient(180deg, rgba(201,160,67,.6), transparent);
  }
  .branch i:nth-child(1){left:8%}
  .branch i:nth-child(2){left:50%}
  .branch i:nth-child(3){right:8%}

  /* ── 노드 (금테 인장 카드) ── */
  .node{display:flex;flex-direction:column;align-items:center;gap:10px;cursor:pointer;}
  .card{
    width:96px;height:96px;position:relative;
    background:
      radial-gradient(ellipse at 30% 25%, rgba(201,160,67,.18), transparent 55%),
      linear-gradient(160deg, #2c1d14 0%, #160c08 100%);
    border:1px solid var(--gold-2);
    border-radius:3px;
    display:flex;align-items:center;justify-content:center;
    box-shadow:
      inset 0 0 0 1px rgba(0,0,0,.7),
      inset 0 0 18px rgba(0,0,0,.5),
      inset 0 1px 0 rgba(201,160,67,.25),
      0 4px 14px rgba(0,0,0,.6);
    transition:all .15s;
    overflow:hidden;
  }
  .card::before{
    content:"";position:absolute;inset:5px;
    border:1px solid rgba(201,160,67,.32);
    pointer-events:none;
  }
  .card .ch{
    font-family:'Nanum Myeongjo',serif;
    font-size:38px;font-weight:700;line-height:1;
    color:var(--gold-1);
    text-shadow:0 0 10px rgba(201,160,67,.4), 0 2px 3px rgba(0,0,0,.8);
    letter-spacing:-2px;
  }
  .lvl-badge{
    position:absolute;bottom:3px;right:5px;
    font-size:10px;color:var(--ink-mid);
    background:rgba(0,0,0,.6);padding:1px 5px;border-radius:2px;
    border:1px solid rgba(201,160,67,.25);
  }
  .node:hover .card{
    border-color:var(--gold-1);
    box-shadow:
      inset 0 0 0 1px rgba(0,0,0,.7),
      inset 0 0 22px rgba(0,0,0,.55),
      inset 0 1px 0 rgba(201,160,67,.35),
      0 0 0 2px rgba(201,160,67,.4),
      0 6px 18px rgba(0,0,0,.7);
  }
  .node .name{font-size:13px;color:var(--ink-light);letter-spacing:2px;font-family:'Nanum Myeongjo',serif;}

  /* 루트 노드 — 주사 */
  .node.root .card{
    width:118px;height:118px;
    background:
      radial-gradient(ellipse at 30% 25%, rgba(255,180,140,.25), transparent 55%),
      linear-gradient(160deg, #6a1d10 0%, #2a0a06 100%);
    border:2px solid var(--gold-1);
    box-shadow:
      inset 0 0 0 1px rgba(0,0,0,.7),
      inset 0 0 22px rgba(0,0,0,.5),
      inset 0 2px 0 rgba(201,160,67,.35),
      0 0 18px rgba(168,51,30,.4),
      0 6px 20px rgba(0,0,0,.7);
  }
  .node.root .card::before{inset:7px;border-color:rgba(201,160,67,.5);}
  .node.root .card .ch{font-size:48px;color:#f4d597;text-shadow:0 0 14px rgba(255,200,120,.5), 0 2px 3px rgba(0,0,0,.8);}
  .node.root .name{color:var(--gold-1);font-size:14px;text-shadow:0 0 6px rgba(201,160,67,.3);}

  .node.dim .card{filter:saturate(.3) brightness(.55);}
  .node.dim .name{color:var(--ink-dim)}

  /* ── 잠긴 영역 — 봉인된 두루마리 ── */
  .locked{
    position:relative;margin:34px 0 0;
    padding:30px 24px;
    background:
      repeating-linear-gradient(0deg, transparent 0 4px, rgba(0,0,0,.18) 4px 5px),
      linear-gradient(180deg, rgba(20,12,8,.7), rgba(10,6,4,.85));
    border:1px solid rgba(201,160,67,.18);
    border-radius:3px;
    text-align:center;cursor:pointer;
    transition:all .15s;
  }
  .locked:hover{border-color:rgba(201,160,67,.4);background:linear-gradient(180deg, rgba(28,18,12,.7), rgba(14,9,6,.85));}
  .locked::before, .locked::after{
    content:"";position:absolute;width:30px;height:1px;background:rgba(201,160,67,.4);top:50%;
  }
  .locked::before{left:18px}
  .locked::after{right:18px}

  .lock-glyph{
    width:84px;height:84px;margin:0 auto 14px;position:relative;
    background:
      radial-gradient(circle at 30% 30%, rgba(168,51,30,.45), transparent 55%),
      radial-gradient(circle, var(--vermilion) 0 60%, var(--vermilion-deep) 61% 100%);
    border:2px solid var(--gold-2);
    border-radius:3px;
    display:flex;align-items:center;justify-content:center;
    box-shadow:
      inset 0 0 0 2px rgba(0,0,0,.5),
      inset 0 -4px 10px rgba(0,0,0,.6),
      0 0 24px rgba(168,51,30,.25),
      0 4px 12px rgba(0,0,0,.6);
  }
  .lock-glyph::before{
    content:"封";position:absolute;font-family:'Nanum Myeongjo',serif;font-size:38px;font-weight:700;
    color:#f4d597;text-shadow:0 0 8px rgba(255,200,120,.4), 0 2px 3px rgba(0,0,0,.8);
  }
  .lock-glyph::after{
    content:"";position:absolute;inset:6px;border:1px dashed rgba(201,160,67,.4);border-radius:2px;
  }

  .locked-text{font-size:14px;color:var(--ink-mid);letter-spacing:4px;font-family:'Nanum Myeongjo',serif;}
  .locked-hint{display:block;font-size:11px;color:var(--ink-dim);margin-top:8px;letter-spacing:2px;font-style:italic;}
</style>
</head>
<body>
<div class="frame">
  <div class="corner tl"></div><div class="corner tr"></div>
  <div class="corner bl"></div><div class="corner br"></div>

  <div class="silk">
    <div class="head">
      <button class="back-btn">← 돌아가기</button>
      <div class="title">拜火敎秘笈<span class="sub">B A E H W A G Y O</span></div>
      <button class="back-btn">약안</button>
    </div>

    <div class="tabs">
      <div class="tab">劍法</div>
      <div class="tab active">心法</div>
      <div class="tab">步法</div>
      <div class="tab">外法</div>
      <div class="tab mystery">???</div>
    </div>

    <div class="inv">
      <div class="inv-cell"><div class="inv-icon">火</div><span class="inv-label">희미한 잔불</span><span class="inv-value">7</span></div>
      <div class="inv-cell"><div class="inv-icon flame">焰</div><span class="inv-label">타오르는 불꽃</span><span class="inv-value">0</span></div>
      <div class="inv-cell"><div class="inv-icon divine">聖</div><span class="inv-label">신성한 정수</span><span class="inv-value">0</span></div>
    </div>

    <div class="tier">
      <div class="tier-line"></div>
      <div class="tier-label">一段</div>
      <div class="tier-line"></div>
    </div>

    <div class="tree">
      <div class="row">
        <div class="node root">
          <div class="card"><div class="ch">開</div><div class="lvl-badge">1 / 30</div></div>
          <div class="name">심법 개방</div>
        </div>
      </div>

      <div class="line-v"></div>
      <div class="branch"><i></i><i></i><i></i></div>

      <div class="row">
        <div class="node dim">
          <div class="card"><div class="ch">念</div><div class="lvl-badge">0 / 30</div></div>
          <div class="name">재의 묵념</div>
        </div>
        <div class="node dim">
          <div class="card"><div class="ch">誓</div><div class="lvl-badge">0 / 30</div></div>
          <div class="name">재의 맹세</div>
        </div>
        <div class="node dim">
          <div class="card"><div class="ch">速</div><div class="lvl-badge">0 / 30</div></div>
          <div class="name">재의 빠름</div>
        </div>
      </div>
    </div>

    <div class="locked">
      <div class="lock-glyph"></div>
      <div class="locked-text">二段 · 봉인된 장</div>
      <span class="locked-hint">강적이 품은 비밀, 혹은 끊임없는 수련</span>
    </div>

    <div class="locked">
      <div class="lock-glyph"></div>
      <div class="locked-text">三段 · 깊은 봉인</div>
      <span class="locked-hint">경지에 이른 자만이 펼칠 수 있는 두루마리</span>
    </div>
  </div>
</div>
</body>
</html>
